name: Release

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run checks and npm publish --dry-run
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test:all

      - name: Package smoke test
        run: npm run test:package

      - name: Package contents test
        run: npm run test:package-contents

      - name: Audit
        run: npm run audit:high

      - name: Size
        run: npm run size

      - name: Publish dry run
        if: ${{ inputs.dry_run }}
        run: npm publish --dry-run

      - name: Publish
        if: ${{ !inputs.dry_run }}
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
